<!DOCTYPE html>
<html lang="de">
<head>

    <title>Minimaler Test</title>

        body { background-color: purple; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { padding: 20px; border: 2px solid white; border-radius: 10px; }

    </script>
</body>
</html>
