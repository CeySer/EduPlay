<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPlay Hub - Die universelle Lernplattform</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; color: #f1f5f9; }
        .flip-card { perspective: 1000px; }
        .flip-card-inner { transition: transform 0.6s; transform-style: preserve-3d; position: relative; width: 100%; height: 100%; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { backface-visibility: hidden; -webkit-backface-visibility: hidden; position: absolute; inset: 0; }
        .flip-card-back { transform: rotateY(180deg); }
        .toggle-checkbox:checked { right: 0; border-color: #10B981; }
        .toggle-checkbox:checked + .toggle-label { background-color: #10B981; }
        .progress-bar-fill { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex justify-center items-start overflow-x-hidden antialiased">

<div id="toast-container" class="fixed top-5 left-1/2 -translate-x-1/2 z-[9999] flex flex-col gap-2 w-[90%] max-w-md pointer-events-none"></div>

<div class="w-full max-w-md min-h-screen bg-[#111827] shadow-2xl relative flex flex-col justify-between pb-24 border-x border-gray-800">
    
    <main class="flex-grow p-4">
        <!-- VIEW: LOGIN -->
        <div id="view-login" class="view">
            <div class="text-center py-8">
                <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-red-500 to-yellow-500 mb-1">EduPlay Hub 🎮</h1>
                <p class="text-gray-400 text-sm">Die spielerische Multi-Lernplattform</p>
            </div>
            
            <div class="bg-gray-800/50 border border-gray-700 p-5 rounded-2xl mb-4 hidden" id="existing-profiles-box">
                <h3 class="text-center font-bold text-yellow-400 mb-3 flex items-center justify-center gap-2"><span>👤 Profil auswählen</span></h3>
                <div id="profile-grid" class="flex flex-wrap justify-center gap-3"></div>
            </div>

            <div class="bg-gray-800 border border-gray-700 p-6 rounded-2xl shadow-lg mb-8">
                <h3 class="text-lg font-bold text-emerald-400 text-center mb-4">Neues Profil erstellen ✍️</h3>
                <div class="space-y-3">
                    <input type="text" id="username-input" placeholder="Name..." class="w-full p-3.5 bg-gray-900 border border-gray-700 rounded-xl text-white outline-none">
                    <input type="number" id="age-input" placeholder="Klasse / Alter..." class="w-full p-3.5 bg-gray-900 border border-gray-700 rounded-xl text-white outline-none">
                    <button class="w-full p-3.5 bg-gradient-to-r from-emerald-500 to-green-600 rounded-xl font-bold text-white shadow-lg" onclick="handleLogin()">Starten 🚀</button>
                </div>
            </div>

            <!-- Eltern-Button unten mittig -->
            <div class="flex justify-center pb-8">
                <button onclick="openParentArea()" class="bg-gray-800 text-gray-400 px-6 py-3 rounded-full text-sm font-bold border border-gray-700 hover:text-white hover:bg-gray-700 transition-all shadow-md flex items-center gap-2">
                    🔒 Elternbereich
                </button>
            </div>
        </div>

        <!-- VIEW: MAIN MENU -->
        <div id="view-menu" class="view hidden space-y-4">
            <div id="subview-home" class="subview space-y-4">
                <div class="bg-slate-900 border border-blue-900/60 p-5 rounded-2xl flex justify-between items-center shadow-xl">
                    <div>
                        <h2 id="welcome-text" class="text-xl font-bold text-white">Hallo!</h2>
                        <div class="flex gap-4 mt-1 text-xs font-semibold">
                            <span class="text-yellow-400">🪙 <span id="menu-coins">0</span> Coins</span>
                            <span class="text-blue-400">🎒 Klasse: <span id="menu-age">-</span></span>
                        </div>
                    </div>
                </div>

                <h1 class="text-2xl font-black text-center mt-4">Wähle deinen Lernbereich:</h1>
                
                <div class="space-y-4">
                    <div class="bg-indigo-900/40 border border-indigo-500/50 p-5 rounded-2xl flex items-center gap-4 cursor-pointer hover:bg-indigo-900/60 transition-all shadow-md" onclick="switchView('vokabeln')">
                        <div class="text-5xl">📖</div>
                        <div>
                            <h2 class="text-xl font-black text-indigo-400">Vokabeln üben</h2>
                            <p class="text-xs text-gray-300">Karteikarten, Quiz & Tippen</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- VIEW: ELTERNBEREICH -->
        <div id="view-parent" class="view hidden space-y-4">
            <button class="bg-gray-700 px-4 py-2 rounded-xl font-bold text-white mb-2" onclick="closeParentArea()">← Zurück zum Login</button>
            <div class="bg-gray-800 border border-gray-700 p-5 rounded-2xl">
                <h3 class="text-xl font-black text-rose-400 mb-2">👨‍👩‍👦 Verwaltung & Fortschritt</h3>
                <div id="parent-stats-container" class="space-y-4 mt-4"></div>
            </div>
        </div>

        <!-- VIEW: VOKABEL-TRAINER -->
        <div id="view-vokabeln" class="view hidden space-y-4">
            <button class="bg-gray-700 px-4 py-2 rounded-xl font-bold text-white" onclick="switchView('menu')">← Zurück</button>
            <div class="bg-gray-800 border border-gray-700 p-5 rounded-2xl text-center space-y-4">
                <h2 class="text-2xl font-black text-indigo-400" id="vocab-title">📖 Vokabel-Trainer</h2>
                
                <div id="lang-selector" class="flex gap-2 bg-gray-900 p-1.5 rounded-xl">
                    <button id="lang-btn-en" class="flex-1 py-2 rounded-lg font-bold bg-blue-600 text-white transition-all" onclick="setLanguage('en')">🇬🇧 Englisch</button>
                    <button id="lang-btn-tr" class="flex-1 py-2 rounded-lg font-bold text-gray-400 transition-all" onclick="setLanguage('tr')">🇹🇷 Türkisch</button>
                </div>
                
                <div id="mode-selector" class="flex gap-2 bg-gray-900 p-1.5 rounded-xl">
                    <button id="vmode-flashcards" class="flex-1 py-2 px-1 rounded-lg font-bold text-white transition-all bg-indigo-600 text-xs" onclick="setVocabMode('flashcards')">🃏 Kärtchen</button>
                    <button id="vmode-mc" class="flex-1 py-2 px-1 rounded-lg font-bold text-gray-400 transition-all bg-gray-900 text-xs" onclick="setVocabMode('mc')">🎯 Auswahl</button>
                    <button id="vmode-typing" class="flex-1 py-2 px-1 rounded-lg font-bold text-gray-400 transition-all bg-gray-900 text-xs" onclick="setVocabMode('typing')">✍️ Tippen</button>
                </div>

                <select id="category-dropdown" class="w-full p-3 bg-gray-900 border rounded-xl text-white font-bold outline-none text-sm" onchange="selectCategory(this.value)"></select>
                
                <div id="exam-banner" class="hidden bg-rose-600 text-white font-bold p-2 rounded-xl text-sm animate-pulse">🔥 PRÜFUNGSMODUS AKTIV 🔥</div>

                <div id="vokabel-box" class="min-h-[200px] flex flex-col justify-center mt-2"></div>
                <div class="text-xs text-gray-400 font-bold mt-4">Wort: <span id="current-index-display" class="text-blue-400">1</span> / <span id="total-display">0</span></div>
            </div>
        </div>
    </main>

    <!-- NAVIGATION BAR -->
    <nav id="main-bottom-nav" class="bottom-nav absolute bottom-0 left-0 right-0 hidden bg-[#0b0f19] border-t border-gray-800 py-3">
        <div class="flex justify-around text-xs font-bold text-gray-400">
            <button class="nav-item text-blue-500" onclick="switchSubpage('home')">🏠 Lernen</button>
            <button class="nav-item" onclick="switchView('login')">🚪 Logout</button>
        </div>
    </nav>
</div>

<script>
    // === 01. VOLLSTÄNDIGE DATENBANK (Schule jetzt mit 50 Wörtern) ===
    let CATEGORY_SETTINGS = JSON.parse(localStorage.getItem('eduplay_categories')) || { numbers: true, school: true, hobbies: true, environment: true };

    const VOCABULARY_DATABASE = {
        en: {
            numbers: { label: "🔢 Zahlen (Kl. 1-4)", words: [{de:"Null",foreign:"zero"},{de:"Eins",foreign:"one"},{de:"Zwei",foreign:"two"},{de:"Drei",foreign:"three"},{de:"Vier",foreign:"four"},{de:"Fünf",foreign:"five"},{de:"Sechs",foreign:"six"},{de:"Sieben",foreign:"seven"},{de:"Acht",foreign:"eight"},{de:"Neun",foreign:"nine"},{de:"Zehn",foreign:"ten"}] },
            school: { 
                label: "🎒 Schule (Kl. 1-4)", 
                words: [{de:"Buch",foreign:"book"},{de:"Tisch",foreign:"desk"},{de:"Stuhl",foreign:"chair"},{de:"Tafel",foreign:"board"},{de:"Schultasche",foreign:"schoolbag"},{de:"Lineal",foreign:"ruler"},{de:"Schere",foreign:"scissors"},{de:"Bleistift",foreign:"pencil"},{de:"Lehrer",foreign:"teacher"},{de:"Hausaufgabe",foreign:"homework"},{de:"Kugelschreiber",foreign:"pen"},{de:"Radiergummi",foreign:"eraser"},{de:"Heft",foreign:"notebook"},{de:"Klassenzimmer",foreign:"classroom"},{de:"Schüler",foreign:"student"},{de:"Unterricht",foreign:"lesson"},{de:"Pause",foreign:"break"},{de:"Schulhof",foreign:"playground"},{de:"Mathe",foreign:"math"},{de:"Englisch",foreign:"english"},{de:"Kunst",foreign:"art"},{de:"Musik",foreign:"music"},{de:"Wissenschaft",foreign:"science"},{de:"Geschichte",foreign:"history"},{de:"Geografie",foreign:"geography"},{de:"Sport",foreign:"physical education"},{de:"Mittagessen",foreign:"lunch"},{de:"Taschenrechner",foreign:"calculator"},{de:"Kleber",foreign:"glue"},{de:"Textmarker",foreign:"highlighter"},{de:"Papier",foreign:"paper"},{de:"Ordner",foreign:"folder"},{de:"Rucksack",foreign:"backpack"},{de:"Bus",foreign:"bus"},{de:"Kreidetafel",foreign:"chalkboard"},{de:"Whiteboard",foreign:"whiteboard"},{de:"Computer",foreign:"computer"},{de:"Landkarte",foreign:"map"},{de:"Globus",foreign:"globe"},{de:"Bibliothek",foreign:"library"},{de:"Schulleiter",foreign:"principal"},{de:"Test",foreign:"test"},{de:"Prüfung",foreign:"exam"},{de:"Note",foreign:"grade"},{de:"Frage",foreign:"question"},{de:"Antwort",foreign:"answer"},{de:"lesen",foreign:"read"},{de:"schreiben",foreign:"write"},{de:"zeichnen",foreign:"draw"},{de:"lernen",foreign:"learn"}]
            },
            hobbies: { label: "⚽ Hobbys (Kl. 5-6)", words: [{de:"Fußball",foreign:"football"},{de:"Schwimmen",foreign:"swimming"},{de:"Lesen",foreign:"reading"}] } // Gekürzt für Übersicht
        },
        tr: {
            numbers: { label: "🔢 Sayılar (Kl. 1-4)", words: [{de:"Null",foreign:"sıfır"},{de:"Eins",foreign:"bir"},{de:"Zwei",foreign:"iki"},{de:"Drei",foreign:"üç"},{de:"Vier",foreign:"dört"},{de:"Fünf",foreign:"beş"},{de:"Sechs",foreign:"altı"},{de:"Sieben",foreign:"yedi"},{de:"Acht",foreign:"sekiz"},{de:"Neun",foreign:"dokuz"},{de:"Zehn",foreign:"on"}] },
            school: { 
                label: "🎒 Okul (Kl. 1-4)", 
                words: [{de:"Buch",foreign:"kitap"},{de:"Tisch",foreign:"masa"},{de:"Stuhl",foreign:"sandalye"},{de:"Tafel",foreign:"tahta"},{de:"Schultasche",foreign:"okul çantası"},{de:"Lineal",foreign:"cetvel"},{de:"Schere",foreign:"makas"},{de:"Bleistift",foreign:"kurşun kalem"},{de:"Lehrer",foreign:"öğretmen"},{de:"Hausaufgabe",foreign:"ödev"},{de:"Kugelschreiber",foreign:"tükenmez kalem"},{de:"Radiergummi",foreign:"silgi"},{de:"Heft",foreign:"defter"},{de:"Klassenzimmer",foreign:"sınıf"},{de:"Schüler",foreign:"öğrenci"},{de:"Unterricht",foreign:"ders"},{de:"Pause",foreign:"teneffüs"},{de:"Schulhof",foreign:"okul bahçesi"},{de:"Mathe",foreign:"matematik"},{de:"Englisch",foreign:"ingilizce"},{de:"Kunst",foreign:"resim"},{de:"Musik",foreign:"müzik"},{de:"Wissenschaft",foreign:"fen bilimleri"},{de:"Geschichte",foreign:"tarih"},{de:"Geografie",foreign:"coğrafya"},{de:"Sport",foreign:"beden eğitimi"},{de:"Mittagessen",foreign:"öğle yemeği"},{de:"Taschenrechner",foreign:"hesap makinesi"},{de:"Kleber",foreign:"yapıştırıcı"},{de:"Textmarker",foreign:"fosforlu kalem"},{de:"Papier",foreign:"kağıt"},{de:"Ordner",foreign:"dosya"},{de:"Rucksack",foreign:"sırt çantası"},{de:"Bus",foreign:"otobüs"},{de:"Kreidetafel",foreign:"kara tahta"},{de:"Whiteboard",foreign:"beyaz tahta"},{de:"Computer",foreign:"bilgisayar"},{de:"Landkarte",foreign:"harita"},{de:"Globus",foreign:"küre"},{de:"Bibliothek",foreign:"kütüphane"},{de:"Schulleiter",foreign:"müdür"},{de:"Test",foreign:"test"},{de:"Prüfung",foreign:"sınav"},{de:"Note",foreign:"not"},{de:"Frage",foreign:"soru"},{de:"Antwort",foreign:"cevap"},{de:"lesen",foreign:"okumak"},{de:"schreiben",foreign:"yazmak"},{de:"zeichnen",foreign:"çizmek"},{de:"lernen",foreign:"öğrenmek"}]
            },
            hobbies: { label: "⚽ Hobiler (Kl. 5-6)", words: [{de:"Fußball",foreign:"futbol"},{de:"Schwimmen",foreign:"yüzme"},{de:"Lesen",foreign:"okuma"}] } // Gekürzt für Übersicht
        }
    };

    let ALL_PLAYERS = {}; let currentPlayer = null; let activePlayerName = "";
    let activeLang = 'en', activeCategory = 'school', vIndex = 0, vocabMode = 'flashcards'; 
    let isExamMode = false;
    
    // ZENTRALE ÄNDERUNG: Die gelernten Wörter gehören jetzt zum jeweiligen Profil!
    let sessionLearnedWords = new Set(); 

    // === UI HILFSFUNKTIONEN ===
    function showToast(message, type = "success") {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = `p-4 rounded-xl shadow-xl font-bold bg-gray-800 text-white border-l-4 ${type === "success" ? "border-emerald-500" : "border-rose-500"}`;
        toast.innerHTML = message; container.appendChild(toast); setTimeout(() => toast.remove(), 3000);
    }

    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        const el = document.getElementById(`view-${viewId}`); if(el) el.classList.remove('hidden');
        document.getElementById("main-bottom-nav").classList.toggle('hidden', (viewId === "login" || viewId === "parent"));
        if(viewId === 'vokabeln') loadVocabSystem();
        if(viewId === 'login') { currentPlayer = null; activePlayerName = ""; isExamMode = false; loadProfiles(); }
    }

    // === ELTERNBEREICH & FORTSCHRITT (Fahrschul-Feature) ===
    function openParentArea() {
        const pin = prompt("Bitte Eltern-PIN eingeben (Standard: 1234):");
        if (pin === "1234") { switchView('parent'); renderParentDashboard(); } 
        else if (pin !== null) { showToast("Falscher PIN!", "error"); }
    }
    function closeParentArea() { switchView('login'); }

    function getTotalDatabaseWords() {
        let total = 0;
        for (let lang in VOCABULARY_DATABASE) { for (let cat in VOCABULARY_DATABASE[lang]) { total += VOCABULARY_DATABASE[lang][cat].words.length; } }
        return total;
    }

    function renderParentDashboard() {
        const container = document.getElementById("parent-stats-container"); container.innerHTML = "";
        const totalPossibleWords = getTotalDatabaseWords();

        Object.keys(ALL_PLAYERS).forEach(key => {
            const p = ALL_PLAYERS[key];
            const learnedArr = p.learnedWords || [];
            const learnedCount = learnedArr.length;
            const percentage = totalPossibleWords > 0 ? Math.round((learnedCount / totalPossibleWords) * 100) : 0;

            let html = `
                <div class="bg-gray-900 border border-gray-700 p-4 rounded-xl mb-3 shadow-md">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-blue-400 font-bold text-lg">👤 ${p.name} <span class="text-sm text-gray-500">(Kl. ${p.age})</span></span>
                        <span class="text-yellow-400 font-bold">🪙 ${p.coins || 0}</span>
                    </div>
                    
                    <!-- Fahrschul-Prozentbalken -->
                    <div class="text-xs text-gray-400 mb-1 font-bold flex justify-between">
                        <span>Gesamtfortschritt</span>
                        <span>${learnedCount} / ${totalPossibleWords} (${percentage}%)</span>
                    </div>
                    <div class="w-full bg-gray-800 rounded-full h-3 mb-4 overflow-hidden border border-gray-700">
                        <div class="bg-gradient-to-r from-emerald-500 to-green-400 h-3 rounded-full progress-bar-fill" style="width: ${percentage}%"></div>
                    </div>
                    
                    <div class="flex gap-2">
                        <button class="flex-1 bg-rose-600 py-2 rounded-lg font-bold text-xs text-white hover:bg-rose-500 transition" onclick="startExamFor('${key}')">⚔️ Test starten</button>
                    </div>
                </div>`;
            container.appendChild(document.createRange().createContextualFragment(html));
        });
    }

    // === PRÜFUNGSMODUS ===
    function startExamFor(playerKey) {
        currentPlayer = ALL_PLAYERS[playerKey];
        activePlayerName = currentPlayer.name;
        sessionLearnedWords = new Set(currentPlayer.learnedWords || []);
        isExamMode = true;
        
        switchView("vokabeln");
        setVocabMode('typing'); // Zwingt zum Tippen
        
        document.getElementById("vocab-title").innerText = `Prüfung: ${currentPlayer.name}`;
        document.getElementById("exam-banner").classList.remove("hidden");
        document.getElementById("lang-selector").classList.add("hidden");
        document.getElementById("mode-selector").classList.add("hidden");
        
        showToast(`Prüfungsmodus für ${currentPlayer.name} gestartet!`, "success");
    }

    // === SPIELER LOGIK ===
    function loadProfiles() { 
        ALL_PLAYERS = JSON.parse(localStorage.getItem("eduplay_players") || "{}"); 
        renderProfileSelection(); 
    }
    
    function renderProfileSelection() {
        const grid = document.getElementById("profile-grid"); const box = document.getElementById("existing-profiles-box"); grid.innerHTML = "";
        const keys = Object.keys(ALL_PLAYERS);
        if(keys.length > 0) {
            box.classList.remove("hidden");
            keys.forEach(k => {
                const btn = document.createElement("button"); btn.className = "bg-gray-700 px-4 py-2 rounded-xl text-sm font-bold text-white hover:bg-blue-600 transition"; btn.innerText = ALL_PLAYERS[k].name;
                btn.onclick = () => { 
                    activePlayerName = ALL_PLAYERS[k].name; 
                    currentPlayer = ALL_PLAYERS[k]; 
                    sessionLearnedWords = new Set(currentPlayer.learnedWords || []); // Lade spezifische Wörter
                    isExamMode = false;
                    document.getElementById("exam-banner").classList.add("hidden");
                    document.getElementById("vocab-title").innerText = `📖 Vokabel-Trainer`;
                    document.getElementById("lang-selector").classList.remove("hidden");
                    document.getElementById("mode-selector").classList.remove("hidden");
                    switchView("menu"); updateDashboardUI(); 
                };
                grid.appendChild(btn);
            });
        }
    }

    function handleLogin() {
        const name = document.getElementById("username-input").value.trim(); const age = docu
