<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPlay Hub - Trennung der Lernbereiche</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ... (Behalte den Rest deiner bestehenden Header-Struktur & Firebase bei) ... -->
</head>
<body class="min-h-screen bg-[#0b0f19] text-white">

<!-- VIEW: NEUES HAUPTMENÜ -->
<div id="view-menu" class="p-6 max-w-md mx-auto space-y-6">
    <h1 class="text-3xl font-black text-center mb-8">Was möchtest du tun? 🎯</h1>
    
    <!-- 1. Vokabeln -->
    <div class="bg-blue-900/30 border border-blue-500/50 p-6 rounded-2xl text-center space-y-3">
        <div class="text-4xl">📖</div>
        <h2 class="text-xl font-bold">Vokabeln üben</h2>
        <p class="text-sm text-gray-400">Wortschatz aufbauen mit Karten & Tippen</p>
        <button onclick="switchView('vokabeln')" class="w-full py-3 bg-blue-600 rounded-xl font-bold">Trainer starten</button>
    </div>

    <!-- 2. Quiz -->
    <div class="bg-pink-900/30 border border-pink-500/50 p-6 rounded-2xl text-center space-y-3">
        <div class="text-4xl">🎯</div>
        <h2 class="text-xl font-bold">Quiz-Arena</h2>
        <p class="text-sm text-gray-400">Wissen testen in Mathe, Deutsch & KFZ</p>
        <button onclick="switchView('quiz_selection')" class="w-full py-3 bg-pink-600 rounded-xl font-bold">Quiz wählen</button>
    </div>

    <!-- 3. Fokus-Lernen -->
    <div class="bg-yellow-900/30 border border-yellow-500/50 p-6 rounded-2xl text-center space-y-3">
        <div class="text-4xl">⏳</div>
        <h2 class="text-xl font-bold">Fokus-Lernzeit</h2>
        <p class="text-sm text-gray-400">Zeit tracken & Schatzkiste freischalten</p>
        <button onclick="startFocusMode()" class="w-full py-3 bg-yellow-600 rounded-xl font-bold">Fokus starten</button>
    </div>
</div>

<!-- Hilfs-View für Quiz-Auswahl -->
<div id="view-quiz_selection" class="view hidden p-6 max-w-md mx-auto space-y-4">
    <button onclick="switchView('menu')" class="text-gray-400">← Zurück</button>
    <h2 class="text-2xl font-bold">Quiz wählen</h2>
    <!-- Hier kommen deine Dropdowns für die Kategorien hin -->
</div>

<!-- ... (Rest des Codes wie Login, Quiz-Arena, Vokabeln, Footer) ... -->

<script>
    // Beispiel für die neue Trennung der Funktionen:
    function startFocusMode() {
        // Leitet direkt in die Quiz-Arena mit aktiviertem Timer
        switchView('quiz_selection');
        showToast("Fokus-Modus aktiv: Sammle Münzen durch Lernen!");
    }
    
    // ... (Behalte deine restlichen Funktionen bei)
</script>
</body>
</html>
